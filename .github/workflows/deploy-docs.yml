# Opsional: deploy otomatis ke GitHub Pages setiap push ke main.
# Di Settings → Pages, pilih sumber "GitHub Actions" jika tersedia,
# atau biarkan sumber branch gh-pages (workflow ini push ke gh-pages).

name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements-docs.txt

      - run: mkdocs build

      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
